name: Build and Deploy to Cloud Run

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-run-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'peaksellchromeextension' }}
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'catalog-api' }}
  AR_HOSTNAME: ${{ vars.AR_HOSTNAME || 'us-central1-docker.pkg.dev' }}
  AR_REPOSITORY: ${{ vars.AR_REPOSITORY || 'cloud-run-source-deploy' }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'googlechromeextensionservice' }}

jobs:
  ci:
    name: Typecheck, Build, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck domain contracts
        run: npm run typecheck:domain

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test -- --runInBand

  deploy:
    name: Deploy to Cloud Run
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOSTNAME }} --quiet

      - id: vars
        name: Build image URI
        shell: bash
        run: |
          IMAGE_URI="${AR_HOSTNAME}/${PROJECT_ID}/${AR_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build and push container
        run: |
          docker build --no-cache -t "${{ steps.vars.outputs.image_uri }}" -f Dockerfile .
          docker push "${{ steps.vars.outputs.image_uri }}"

      - id: deploy
        name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ steps.vars.outputs.image_uri }}

      - name: Show output
        run: echo ${{ steps.deploy.outputs.url }}
