name: Cloud Run CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-run-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'catalog-api' }}
  AR_HOSTNAME: ${{ vars.AR_HOSTNAME || 'us-central1-docker.pkg.dev' }}
  AR_REPOSITORY: ${{ vars.AR_REPOSITORY || 'cloud-run-source-deploy' }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}

jobs:
  ci:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck domain contracts
        run: npm run typecheck:domain

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test -- --runInBand

  deploy:
    name: Deploy to Cloud Run
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOSTNAME }} --quiet

      - name: Build image URI
        id: vars
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          IMAGE_NAME="${IMAGE_NAME:-$REPO_NAME}"
          IMAGE_URI="${AR_HOSTNAME}/${GCP_PROJECT_ID}/${AR_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build container image
        run: |
          docker build --no-cache -t "${{ steps.vars.outputs.image_uri }}" -f Dockerfile .

      - name: Push container image
        run: |
          docker push "${{ steps.vars.outputs.image_uri }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --platform=managed \
            --image="${{ steps.vars.outputs.image_uri }}" \
            --region="${GCP_REGION}" \
            --labels="managed-by=github-actions,commit-sha=${GITHUB_SHA},github-run-id=${GITHUB_RUN_ID}" \
            --quiet
